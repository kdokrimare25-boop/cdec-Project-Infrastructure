# AWS ALB Ingress — reference manifest (managed by Terraform: infrastructure/modules/alb-ingress).
# HTTP (80) + HTTPS (443), HTTP redirects to HTTPS. Requires AWS Load Balancer Controller on the cluster.
# Prefer: terraform apply in infrastructure/backend (enable_alb_ingress = true).
# This file is kept for Jenkins/manual apply when Terraform is not used.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudblitz-api-ingress
  namespace: default
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-name: cdec-alpha-alb
    alb.ingress.kubernetes.io/security-groups: __SECURITY_GROUP_ID__
    alb.ingress.kubernetes.io/manage-backend-security-group-rules: "true"
    alb.ingress.kubernetes.io/backend-protocol: HTTP
    alb.ingress.kubernetes.io/healthcheck-path: /api/auth/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"
    # Listeners: port 80 (HTTP) and port 443 (HTTPS)
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:eu-west-1:439055361064:certificate/a27bb5a0-834a-4e24-8dcb-9e0fb846d08a
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS-1-2-2017-01
spec:
  ingressClassName: alb
  rules:
    - host: __INGRESS_HOST__
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8081
          - path: /api/courses
            pathType: Prefix
            backend:
              service:
                name: course-service
                port:
                  number: 8082
          - path: /api/enroll
            pathType: Prefix
            backend:
              service:
                name: enrollment-service
                port:
                  number: 8083
