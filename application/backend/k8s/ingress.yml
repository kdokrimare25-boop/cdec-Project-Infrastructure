# Routes backend APIs to ClusterIP services (requires an Ingress controller, e.g. NGINX, on the cluster).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend-ingress
  labels:
    app: backend
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  ingressClassName: nginx
  rules:
    - host: __INGRESS_HOST__
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend:
              service:
                name: auth-service
                port:
                  number: 8081
          - path: /api/courses
            pathType: Prefix
            backend:
              service:
                name: course-service
                port:
                  number: 8082
          - path: /api/enroll
            pathType: Prefix
            backend:
              service:
                name: enrollment-service
                port:
                  number: 8083
